<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Premium Player</title>
    <!-- Bootstrap 5.3 Premium Dark Support -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- HLS.js Core -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-dark-pure: #090a0f;
            --bg-card-dark: #131520;
            --accent-color: #e50914; /* Red Streaming Accent */
            --accent-hover: #b80710;
            --text-muted-custom: #8a8e99;
            --card-transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark-pure);
            color: #f1f3f5;
            padding-bottom: 120px; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        [data-bs-theme="light"] {
            --bg-dark-pure: #f4f6f9;
            --bg-card-dark: #ffffff;
            --text-muted-custom: #6c757d;
        }

        /* Navbar Styling */
        .navbar-premium {
            background: rgba(var(--bg-dark-pure), 0.75);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        [data-bs-theme="light"] .navbar-premium {
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        /* Input Card Design */
        .premium-card {
            background: var(--bg-card-dark);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        [data-bs-theme="light"] .premium-card {
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .form-control-premium {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
            transition: var(--card-transition);
        }
        [data-bs-theme="light"] .form-control-premium {
            background: #fff;
            border: 1px solid rgba(0,0,0,0.15);
            color: #000;
        }
        .form-control-premium:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.25);
            color: #fff;
        }
        [data-bs-theme="light"] .form-control-premium:focus {
            background: #fff;
            color: #000;
        }

        /* Filter Button Design */
        .btn-filter {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: #fff;
            transition: var(--card-transition);
        }
        [data-bs-theme="light"] .btn-filter {
            background: #fff;
            color: #495057;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .btn-filter.active, .btn-filter:hover {
            background: var(--accent-color) !important;
            border-color: var(--accent-color) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.35);
        }

        /* Item Grid & Card Design */
        .item-card { 
            cursor: pointer; 
            transition: var(--card-transition); 
            border: 1px solid rgba(255,255,255,0.04); 
            border-radius: 14px; 
            overflow: hidden; 
            background: var(--bg-card-dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .item-card:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); 
            border-color: rgba(229, 9, 20, 0.5); 
        }
        [data-bs-theme="light"] .item-card {
            border: 1px solid rgba(0,0,0,0.06);
        }
        [data-bs-theme="light"] .item-card:hover {
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .img-container { 
            position: relative; 
            width: 100%; 
            height: 140px; 
            background: #07080c; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .item-card img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            padding: 10px; 
            transition: var(--card-transition); 
        }
        .item-card:hover img { 
            transform: scale(1.06); 
        }

        .item-title { 
            font-size: 0.85rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .item-meta {
            font-size: 0.72rem;
            color: var(--text-muted-custom);
        }

        /* Badges Overlay */
        .badge-stream {
            font-size: 0.68rem;
            padding: 5px 9px;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Cinematic Player Container */
        .player-container { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(10, 11, 16, 0.96); 
            backdrop-filter: blur(20px); 
            z-index: 1060; 
            padding: 20px; 
            display: none; 
            flex-direction: column; 
            border-top: 3px solid var(--accent-color); 
            box-shadow: 0 -15px 40px rgba(0,0,0,0.6); 
        }
        .player-container.active { display: flex; }
        .player-container video { width: 100%; max-height: 48vh; border-radius: 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Custom Scrollbar Elements */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark-pure); }
        ::-webkit-scrollbar-thumb { background: #2c2f3b; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        /* Modal Customizations */
        .modal-content {
            background-color: var(--bg-card-dark);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
        }
        .nav-pills .nav-link {
            color: #f1f3f5;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            transition: var(--card-transition);
        }
        [data-bs-theme="light"] .nav-pills .nav-link {
            color: #333;
            border: 1px solid rgba(0,0,0,0.1);
            background: #fff;
        }
        .nav-pills .nav-link.active {
            background-color: var(--accent-color) !important;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
        }
        .list-group-item-action {
            color: inherit;
            transition: var(--card-transition);
        }
        .list-group-item-action:hover {
            background-color: rgba(229, 9, 20, 0.08);
            color: var(--accent-color);
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="card premium-card p-4 mb-4">

                <input type="text" id="urlInput" class="form-control form-control-premium border-0" 
                       value="http://pvsrvs.xyz:80/get.php?username=897549712031832&password=0520741888369&type=m3u_plus&output=m3u8"

    <!-- Series Dynamic Modal (Nested Structure System) -->

    <script>
        (function() {
            const WORKER_URL = 'https://iptv-cors-proxy.exportauan659.workers.dev';
            const ITEMS_PER_PAGE = 60;

            let allItems = [];
            let filteredItems = [];
            let currentCategory = 'all';
            let currentSearch = '';
            let currentPage = 1;
            let hls = null;
            let seriesModalInstance = null;

            // Mapping DOM Controls
            const urlInput = document.getElementById('urlInput');
            const loadBtn = document.getElementById('loadBtn');
            const statusDiv = document.getElementById('statusMessage');
            const itemsGrid = document.getElementById('itemsGrid');
            const searchInput = document.getElementById('searchInput');
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            const playerTitle = document.getElementById('playerTitle');
            const closePlayerBtn = document.getElementById('closePlayer');
            const playerErrorDiv = document.getElementById('playerError');
            const paginationTop = document.getElementById('paginationTop');
            const paginationBottom = document.getElementById('paginationBottom');
            const itemCount = document.getElementById('itemCount');

            // Theme Management Lifecycle
            function initTheme() {
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-bs-theme', savedTheme);
                updateThemeIcon(savedTheme);
            }
            function updateThemeIcon(theme) {
                const icon = document.getElementById('themeIcon');
                const btn = document.getElementById('themeToggle');
                if (theme === 'dark') {
                    icon.className = 'bi bi-sun-fill text-warning';
                    btn.className = 'btn btn-outline-light rounded-circle shadow-sm';
                } else {
                    icon.className = 'bi bi-moon-stars-fill text-dark';
                    btn.className = 'btn btn-outline-dark rounded-circle shadow-sm';
                }
            }
            document.getElementById('themeToggle').addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });

            function showStatus(msg, type = 'info') {
                statusDiv.textContent = msg;
                statusDiv.className = `alert alert-${type} border-0 shadow-sm`;
                statusDiv.style.display = 'block';
            }

            // Engine Inteligente de Categorias e "Cão de Guarda" Nível 1 Otimizado (Prevenção Total de Vazamento)
            function getCategory(url, group, name) {
                url = (url || '').toLowerCase();
                group = (group || '').toLowerCase();
                name = (name || '').toLowerCase();

                // 1. O CÃO DE GUARDA ABSOLUTO: Bloqueia canais lineares, streams 24h, cine sky e canais adultos na hora!
                const liveTvKeywords = [
                    '24hrs', '24h', '24 horas', 'cine series', 'cine tv', 'filmes e series', 
                    'telecine', 'hbo', 'sportv', 'premiere', 'espn', 'tnt', 'max', 'disney', 
                    'canais 4k', 'esportes', 'documentários', 'noticias', 'notícia', 'abertos', 'ppv', 
                    'globo', 'sbt', 'record', 'band', 'sessão cinema', 'sessao cinema', 
                    'cine sky', 'cine marvel', 'xxx', 'adulto', 'adultos', '18+'
                ];
                
                if (liveTvKeywords.some(keyword => group.includes(keyword) || name.includes(keyword))) {
                    return 'channel'; 
                }

                // 2. Verificação por links de rotas internas de Servidores Xtream Codes API
                if (url.includes('/movie/')) return 'movie';
                if (url.includes('/series/')) return 'series';
                if (url.includes('/live/')) return 'channel';

                // 3. Verificação por extensões de mídias de vídeo direto de arquivos sob demanda (VOD)
                if (url.match(/\.(mp4|mkv|avi)$/i)) {
                    if (group.includes('serie') || group.includes('série') || name.match(/[S|T]\d+[E|x]\d+/i)) return 'series';
                    return 'movie';
                }

                // 4. Detecção semântica contextual secundária
                if (group.includes('vod') || group.includes('lançamento') || group.includes('cinema') || group.includes('filme')) return 'movie';
                if (group.includes('série') || group.includes('serie') || group.includes('temporada')) return 'series';

                return 'channel';
            }

            // Engine de Processamento e Compactação Estrutural de Listas M3U
            function processAndGroupM3U(text) {
                const lines = text.split('
');
                const rawItems = [];
                let currentItem = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        const attrs = {};
                        let match;
                        const attrRegex = /([a-zA-Z-]+)="([^"]*)"/g;
                        while ((match = attrRegex.exec(line)) !== null) attrs[match[1]] = match[2];
                        
                        const title = line.substring(line.indexOf(',') + 1).trim();
                        // Conversão Forçada de Protocolo Inseguro HTTP -> HTTPS para mitigar alertas de Mixed Content
                        let safeLogo = (attrs['tvg-logo'] || '').replace(/^http:\/\//i, 'https://');
                        
                        currentItem = {
                            name: attrs['tvg-name'] || title || 'Canal Sem Nome',
                            logo: safeLogo,
                            group: attrs['group-title'] || 'Geral',
                            url: null
                        };
                    } else if (line && !line.startsWith('#') && currentItem) {
                        currentItem.url = line;
                        rawItems.push(currentItem);
                        currentItem = null;
                    }
                }

                const processed = [];
                const seriesMap = {};

                rawItems.forEach(item => {
                    const cat = getCategory(item.url, item.group, item.name);
                    item.category = cat;

                    if (cat === 'series') {
                        // Regex Avançada para Detecção de Padrões: S01E02, S1 E2, Temporada 01 Episódio 02, etc.
                        const regexS0E0 = /(.*?)\s*[-_:]?\s*[S|T]0*(\d+)\s*[-_]?\s*[E|EP|x]\s*0*(\d+)(.*)/i;
                        const match = item.name.match(regexS0E0);

                        if (match) {
                            const seriesName = match[1].trim() || item.group;
                            const seasonNum = parseInt(match[2], 10);
                            const episodeNum = parseInt(match[3], 10);

                            if (!seriesMap[seriesName]) {
                                seriesMap[seriesName] = {
                                    isSeriesFolder: true,
                                    name: seriesName,
                                    logo: item.logo,
                                    group: item.group,
                                    category: 'series',
                                    seasons: {}
                                };
                                processed.push(seriesMap[seriesName]);
                            }

                            if (!seriesMap[seriesName].seasons[seasonNum]) {
                                seriesMap[seriesName].seasons[seasonNum] = [];
                            }

                            seriesMap[seriesName].seasons[seasonNum].push({
                                ...item,
                                epNumber: episodeNum,
                                cleanName: `Episódio ${episodeNum} ${match[4] ? '- ' + match[4].trim() : ''}`
                            });
                        } else {
                            processed.push(item);
                        }
                    } else {
                        processed.push(item);
                    }
                });

                return processed;
            }

            function applyFilters() {
                filteredItems = allItems.filter(item => {
                    if (currentCategory !== 'all' && item.category !== currentCategory) return false;
                    if (currentSearch) {
                        const s = currentSearch.toLowerCase();
                        return item.name.toLowerCase().includes(s) || item.group.toLowerCase().includes(s);
                    }
                    return true;
                });
                currentPage = 1;
            }

            function renderPage() {
                const totalItems = filteredItems.length;
                const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE) || 1;
                if (currentPage > totalPages) currentPage = totalPages;
                
                const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
                const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, totalItems);
                const pageItems = filteredItems.slice(startIdx, endIdx);

                itemsGrid.innerHTML = '';
                if (pageItems.length === 0) {
                    itemsGrid.innerHTML = `
                        <div class="col-12 w-100 text-center py-5 text-muted">
                            <i class="bi bi-search-heart fs-2 d-block mb-2"></i>
                            Nenhum resultado corresponde à busca ou filtros aplicados.
                        </div>`;
                    itemCount.textContent = `0 resultados`;
                    updatePagination(1);
                    return;
                }

                pageItems.forEach(item => {
                    const col = document.createElement('div');
                    col.className = 'col';
                    const placeholder = 'https://via.placeholder.com/300x200?text=Premium+IPTV';
                    
                    const folderBadge = item.isSeriesFolder 
                        ? `<span class="badge bg-danger position-absolute top-0 end-0 m-2 badge-stream"><i class="bi bi-folder2-open me-1"></i>Série</span>` 
                        : '';

                    col.innerHTML = `
                        <div class="card item-card h-100 position-relative">
                            ${folderBadge}
                            <div class="img-container">
                                <img src="${item.logo || placeholder}" loading="lazy" onerror="this.onerror=null; this.src='${placeholder}';">
                            </div>
                            <div class="card-body p-3 d-flex flex-column justify-content-between">
                                <div class="mb-2">
                                    <p class="item-title text-body" title="${item.name}">${item.name}</p>
                                </div>
                                <span class="badge bg-secondary-subtle text-secondary-emphasis text-truncate item-meta w-100 text-start px-2 py-1.5" style="border: 1px solid rgba(255,255,255,0.02)">
                                    ${item.group}
                                </span>
                            </div>
                        </div>
                    `;

                    col.querySelector('.item-card').addEventListener('click', () => {
                        if (item.isSeriesFolder) {
                            openSeriesModal(item);
                        } else {
                            playStream(item.url, item.name);
                        }
                    });
                    itemsGrid.appendChild(col);
                });

                itemCount.textContent = `Exibindo de ${startIdx + 1} a ${endIdx} de ${totalItems} resultados mapeados`;
                updatePagination(totalPages);
            }

            // Interface do Modal Inteligente de Séries
            function openSeriesModal(series) {
                seriesModalInstance = new bootstrap.Modal(document.getElementById('seriesModal'));
                document.getElementById('seriesModalTitle').textContent = series.name;
                
                const tabsContainer = document.getElementById('seasonTabs');
                const contentContainer = document.getElementById('seasonContent');
                tabsContainer.innerHTML = ''; contentContainer.innerHTML = '';

                const seasons = Object.keys(series.seasons).map(Number).sort((a,b)=>a-b);
                
                seasons.forEach((seasonNum, index) => {
                    const isActive = index === 0 ? 'active' : '';
                    
                    // Render Tab Navigation Pill
                    tabsContainer.innerHTML += `
                        <li class="nav-item" role="presentation">
                            <button class="nav-link ${isActive} rounded-pill border-0 px-3 py-2 fw-medium m-1" id="tab-s${seasonNum}" data-bs-toggle="pill" data-bs-target="#s${seasonNum}" type="button">
                                Temporada ${seasonNum}
                            </button>
                        </li>`;
                    
                    // Render Episode Rows Array
                    const episodesList = series.seasons[seasonNum].sort((a,b) => a.epNumber - b.epNumber);
                    let epHtml = `<div class="list-group list-group-flush">`;
                    episodesList.forEach(ep => {
                        epHtml += `
                            <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center bg-transparent border-bottom border-secondary border-opacity-10 py-3 text-white-50" onclick="window.startEpisode('${ep.url}', '${series.name} - ${ep.cleanName}')">
                                <span class="fw-medium text-body"><i class="bi bi-play-circle-fill text-danger me-3 fs-5"></i>${ep.cleanName}</span>
                                <i class="bi bi-chevron-right text-muted small"></i>
                            </button>`;
                    });
                    epHtml += `</div>`;

                    contentContainer.innerHTML += `
                        <div class="tab-pane fade ${index === 0 ? 'show active' : ''}" id="s${seasonNum}" role="tabpanel">
                            ${epHtml}
                        </div>`;
                });

                seriesModalInstance.show();
            }

            window.startEpisode = function(url, title) {
                if(seriesModalInstance) seriesModalInstance.hide();
                playStream(url, title);
            }

            function updatePagination(totalPages) {
                const render = (p) => `
                    <div class="d-flex align-items-center gap-1 justify-content-center flex-wrap">
                        <button class="btn btn-sm btn-outline-secondary px-2.5 rounded-3" id="${p}First" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-double-left"></i></button>
                        <button class="btn btn-sm btn-outline-secondary px-2.5 rounded-3" id="${p}Prev" ${currentPage === 1 ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>
                        <span class="mx-2 small text-secondary fw-medium">Pág.</span>
                        <input type="number" class="form-control form-control-sm text-center font-monospace bg-dark text-white border-secondary border-opacity-25 shadow-sm" style="width:65px; border-radius: 6px;" id="${p}Jump" value="${currentPage}">
                        <span class="mx-2 small text-secondary fw-medium">de ${totalPages}</span>
                        <button class="btn btn-sm btn-outline-secondary px-2.5 rounded-3" id="${p}Next" ${currentPage === totalPages ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>
                        <button class="btn btn-sm btn-outline-secondary px-2.5 rounded-3" id="${p}Last" ${currentPage === totalPages ? 'disabled' : ''}><i class="bi bi-chevron-double-right"></i></button>
                    </div>`;
                    
                paginationTop.innerHTML = render('top');
                paginationBottom.innerHTML = render('bottom');

                ['top', 'bottom'].forEach(p => {
                    document.getElementById(`${p}First`)?.addEventListener('click', () => { currentPage = 1; renderPage(); window.scrollTo({top: 0, behavior: 'smooth'}); });
                    document.getElementById(`${p}Prev`)?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); window.scrollTo({top: 0, behavior: 'smooth'}); } });
                    document.getElementById(`${p}Next`)?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(); window.scrollTo({top: 0, behavior: 'smooth'}); } });
                    document.getElementById(`${p}Last`)?.addEventListener('click', () => { currentPage = totalPages; renderPage(); window.scrollTo({top: 0, behavior: 'smooth'}); });
                    document.getElementById(`${p}Jump`)?.addEventListener('change', (e) => { 
                        let val = parseInt(e.target.value, 10) || 1;
                        if(val < 1) val = 1; if(val > totalPages) val = totalPages;
                        currentPage = val; renderPage(); 
                    });
                });
            }

            async function loadPlaylist() {
                let url = urlInput.value.trim();
                if (!url) return showStatus('Insira um link de lista M3U válido antes de prosseguir.', 'warning');
                
                // Correção em Runtime para evitar decodificações e requisições no formato .ts legado
                if(url.includes('output=ts')) {
                    url = url.replace('output=ts', 'output=m3u8');
                    urlInput.value = url;
                }
                
                loadBtn.disabled = true; 
                loadBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sincronizando...';
                showStatus('Realizando download e cripto-análise da estrutura de dados M3U...', 'info');
                
                try {
                    const response = await fetch(`${WORKER_URL}?url=${encodeURIComponent(url)}`);
                    if (!response.ok) throw new Error(`HTTP Provedor Status ${response.status}`);
                    const data = await response.text();
                    
                    allItems = processAndGroupM3U(data);
                    showStatus(`Sincronização concluída com sucesso! ${allItems.length} mídias catalogadas na grade.`, 'success');
                    
                    applyFilters(); 
                    renderPage();
                } catch (error) {
                    showStatus(`Falha Crítica na Conexão CORS Proxy: ${error.message}. Verifique a saúde do seu Worker.`, 'danger');
                } finally {
                    loadBtn.disabled = false; 
                    loadBtn.innerHTML = 'Carregar Conteúdo';
                }
            }

            // Engine Decodificadora de Vídeo do Reprodutor (HLS & Direct Video Control)
            function playStream(url, title) {
                playerContainer.classList.add('active'); 
                playerTitle.textContent = title; 
                playerErrorDiv.style.display = 'none';
                playerErrorDiv.textContent = '';
                
                if (hls) { hls.destroy(); hls = null; }
                videoPlayer.removeAttribute('src'); 
                videoPlayer.load();

                const streamUrl = `${WORKER_URL}/video?url=${encodeURIComponent(url)}`;
                const isHls = url.toLowerCase().includes('.m3u8') || !url.match(/\.(mp4|mkv|avi|ts)$/i);

                const renderUIError = (msg) => {
                    playerErrorDiv.textContent = msg;
                    playerErrorDiv.style.display = 'block';
                };

                if (isHls) {
                    if (Hls.isSupported()) {
                        hls = new Hls({ maxMaxBufferLength: 20, enableWorker: true, lowLatencyMode: true });
                        hls.loadSource(streamUrl); 
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            videoPlayer.play().catch(() => console.log('Autoplay contido pelo browser. Aguardando gatilho físico.'));
                        });
                        hls.on(Hls.Events.ERROR, (e, data) => { 
                            if(data.fatal) {
                                renderUIError('Erro de decodificação HLS ou bloqueio de ASN/IP pelo Provedor (HTTP 403).');
                            } 
                        });
                    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        videoPlayer.src = streamUrl;
                        videoPlayer.addEventListener('loadedmetadata', () => videoPlayer.play());
                    } else {
                        renderUIError('Seu ecossistema não possui suporte para a decodificação de codecs HLS (.m3u8).');
                    }
                } else {
                    videoPlayer.src = streamUrl;
                    videoPlayer.play().catch(e => renderUIError('Falha no Playback do Arquivo de Vídeo Direto: ' + e.message));
                }

                videoPlayer.onerror = () => {
                    const err = videoPlayer.error;
                    if(err) renderUIError(`Erro Nativo do Player [Código ${err.code}]: A transmissão pode estar offline.`);
                };
            }

            closePlayerBtn.addEventListener('click', () => {
                videoPlayer.pause(); 
                if (hls) { hls.destroy(); hls = null; } 
                videoPlayer.removeAttribute('src');
                videoPlayer.load();
                playerContainer.classList.remove('active');
            });

            // Listeners dos Filtros de Categoria
            document.getElementById('categoryFilters').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                const btns = document.querySelectorAll('#categoryFilters button');
                btns.forEach(b => b.classList.remove('active')); 
                btn.classList.add('active');
                currentCategory = btn.dataset.category; 
                applyFilters(); 
                renderPage();
            });

            // Debounce Input Control para a Busca Dinâmica
            let searchTimeout;
            searchInput.addEventListener('input', e => { 
                clearTimeout(searchTimeout); 
                searchTimeout = setTimeout(() => { 
                    currentSearch = e.target.value.trim(); 
                    applyFilters(); 
                    renderPage(); 
                }, 300); 
            });

            loadBtn.addEventListener('click', loadPlaylist);
            initTheme();
        })();
    </script>
</body>
</html>
