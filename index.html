<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { padding-bottom: 80px; background: #f5f5f5; }
        .item-card { cursor: pointer; transition: transform 0.2s; }
        .item-card:hover { transform: scale(1.03); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
        .item-card img { height: 120px; object-fit: contain; background: #000; }
        .item-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-container { position: fixed; bottom: 0; left: 0; right: 0; background: #000; z-index: 1000; padding: 10px; display: none; flex-direction: column; }
        .player-container.active { display: flex; }
        .player-container video { width: 100%; max-height: 60vh; }
        .close-player { align-self: flex-end; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container mt-3">
        <h1 class="mb-3 text-center">📡 IPTV Player</h1>
        <div class="input-group mb-3">
            <input type="text" id="urlInput" class="form-control" 
                   value="http://pvsrvs.xyz:80/get.php?username=897549712031832&password=0520741888369&type=m3u_plus&output=ts"
                   placeholder="Cole a URL da lista M3U aqui...">
            <button id="loadBtn" class="btn btn-danger">Carregar Lista</button>
        </div>
        <div id="statusMessage" class="alert" role="alert" style="display:none;"></div>
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
            <div class="btn-group mb-2" role="group" id="categoryFilters">
                <button type="button" class="btn btn-outline-secondary active" data-category="all">Todos</button>
                <button type="button" class="btn btn-outline-secondary" data-category="channel">📺 Canais</button>
                <button type="button" class="btn btn-outline-secondary" data-category="movie">🎬 Filmes</button>
                <button type="button" class="btn btn-outline-secondary" data-category="series">📺 Séries</button>
            </div>
            <input type="text" id="searchInput" class="form-control mb-2" placeholder="Buscar..." style="max-width:250px;">
        </div>
        <div id="itemsGrid" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-2"></div>
    </div>
    <div id="playerContainer" class="player-container">
        <button id="closePlayer" class="btn btn-sm btn-light close-player">✖ Fechar</button>
        <video id="videoPlayer" controls playsinline></video>
        <div id="playerError" class="text-danger mt-1 small text-center"></div>
    </div>

    <script>
        (function() {
            // ⚡️ SUBSTITUA AQUI PELA URL DO SEU WORKER
            const WORKER_URL = 'https://iptv-cors-proxy.exportauan659.workers.dev/';

            let allItems = [];
            let currentCategory = 'all';
            let currentSearch = '';
            let hls = null;

            const urlInput = document.getElementById('urlInput');
            const loadBtn = document.getElementById('loadBtn');
            const statusDiv = document.getElementById('statusMessage');
            const itemsGrid = document.getElementById('itemsGrid');
            const categoryBtns = document.querySelectorAll('#categoryFilters button');
            const searchInput = document.getElementById('searchInput');
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            const closePlayerBtn = document.getElementById('closePlayer');
            const playerErrorDiv = document.getElementById('playerError');

            function showStatus(msg, type = 'info') {
                statusDiv.textContent = msg;
                statusDiv.className = `alert alert-${type}`;
                statusDiv.style.display = 'block';
                setTimeout(() => { statusDiv.style.display = 'none'; }, 6000);
            }

            function parseM3U(text) {
                const lines = text.split('\n');
                const items = [];
                let currentItem = null;
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        const attrs = {};
                        const attrRegex = /([a-zA-Z-]+)="([^"]*)"/g;
                        let match;
                        while ((match = attrRegex.exec(line)) !== null) {
                            attrs[match[1]] = match[2];
                        }
                        const commaIndex = line.indexOf(',');
                        const title = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : '';
                        currentItem = {
                            name: attrs['tvg-name'] || title || 'Sem nome',
                            logo: attrs['tvg-logo'] || '',
                            group: attrs['group-title'] || 'Sem grupo',
                            url: null
                        };
                    } else if (line && !line.startsWith('#') && currentItem) {
                        currentItem.url = line;
                        items.push(currentItem);
                        currentItem = null;
                    }
                }
                return items;
            }

            function getCategory(item) {
                const g = item.group.toLowerCase();
                if (g.includes('filme') || g.includes('movie') || g.includes('película')) return 'movie';
                if (g.includes('série') || g.includes('serie') || g.includes('series') || g.includes('tv show')) return 'series';
                return 'channel';
            }

            async function fetchPlaylist(originalUrl) {
                const proxyUrl = `${WORKER_URL}/?url=${encodeURIComponent(originalUrl)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`Erro ${response.status}`);
                return await response.text();
            }

            function filterItems() {
                return allItems.filter(item => {
                    if (currentCategory !== 'all' && getCategory(item) !== currentCategory) return false;
                    if (currentSearch) {
                        const s = currentSearch.toLowerCase();
                        if (!item.name.toLowerCase().includes(s) && !item.group.toLowerCase().includes(s)) return false;
                    }
                    return true;
                });
            }

            function renderItems() {
                const filtered = filterItems();
                itemsGrid.innerHTML = '';
                if (filtered.length === 0) {
                    itemsGrid.innerHTML = '<div class="col-12 text-center text-muted">Nenhum item encontrado.</div>';
                    return;
                }
                filtered.forEach(item => {
                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = `
                        <div class="card item-card h-100">
                            <img src="${item.logo || 'https://via.placeholder.com/300x200?text=Sem+Logo'}" 
                                 class="card-img-top" alt="${item.name}" 
                                 onerror="this.src='https://via.placeholder.com/300x200?text=Sem+Logo'">
                            <div class="card-body p-1">
                                <p class="item-name mb-0" title="${item.name}">${item.name}</p>
                                <small class="text-muted">${item.group}</small>
                            </div>
                        </div>
                    `;
                    col.querySelector('.item-card').addEventListener('click', () => playStream(item.url, item.name));
                    itemsGrid.appendChild(col);
                });
            }

            async function loadPlaylist() {
                const url = urlInput.value.trim();
                if (!url) return showStatus('Insira uma URL.', 'warning');
                loadBtn.disabled = true;
                loadBtn.innerHTML = '⏳ Baixando lista...';
                showStatus('Baixando lista...', 'info');
                try {
                    const data = await fetchPlaylist(url);
                    allItems = parseM3U(data);
                    if (allItems.length === 0) {
                        showStatus('Nenhum item encontrado.', 'warning');
                    } else {
                        showStatus(`${allItems.length} itens carregados!`, 'success');
                    }
                    renderItems();
                } catch (error) {
                    showStatus(`Erro: ${error.message}`, 'danger');
                    console.error(error);
                } finally {
                    loadBtn.disabled = false;
                    loadBtn.innerHTML = 'Carregar Lista';
                }
            }

            function playStream(url, title) {
                playerContainer.classList.add('active');
                playerErrorDiv.textContent = '';
                if (hls) { hls.destroy(); hls = null; }
                videoPlayer.src = '';

                const streamUrl = `${WORKER_URL}/video?url=${encodeURIComponent(url)}`;

                if (url.toLowerCase().includes('.m3u8')) {
                    if (Hls.isSupported()) {
                        hls = new Hls();
                        hls.loadSource(streamUrl);
                        hls.attachMedia(videoPlayer);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play().catch(() => {}));
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            console.error('HLS error:', data);
                            playerErrorDiv.textContent = `Erro: ${data.details}`;
                            if (data.fatal) {
                                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                                else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                                else { playerErrorDiv.textContent = 'Erro fatal.'; hls.destroy(); }
                            }
                        });
                    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        videoPlayer.src = streamUrl;
                        videoPlayer.play().catch(() => {});
                    } else {
                        playerErrorDiv.textContent = 'Navegador não suporta HLS.';
                    }
                } else {
                    videoPlayer.src = streamUrl;
                    videoPlayer.play().catch(() => {});
                }
                videoPlayer.onerror = () => {
                    playerErrorDiv.textContent = `Erro de reprodução: ${videoPlayer.error?.message || 'desconhecido'}`;
                };
            }

            function closePlayer() {
                videoPlayer.pause();
                if (hls) { hls.destroy(); hls = null; }
                videoPlayer.removeAttribute('src');
                videoPlayer.load();
                playerContainer.classList.remove('active');
                playerErrorDiv.textContent = '';
            }

            loadBtn.addEventListener('click', loadPlaylist);
            categoryBtns.forEach(btn => btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderItems();
            }));
            searchInput.addEventListener('input', e => {
                currentSearch = e.target.value.trim();
                renderItems();
            });
            closePlayerBtn.addEventListener('click', closePlayer);
        })();
    </script>
</body>
</html>
